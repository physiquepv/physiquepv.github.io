<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sequence Memory Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
    /* Thème Dark (Défaut) */
    --bg: #1a1a1a;
    --surface: #222222;
    --tile: #333333;
    --tile-active: #ffffff;
    --tile-wrong: #d9534f;
    --text: #e8e8e8;
    --text-muted: #777777;
    --accent: #5cb85c;
    --speed-on: #f0ad4e;
}

/* Thème Bleu Océan */
body.theme-blue {
    --bg: #0f172a;
    --surface: #1e293b;
    --tile: #334155;
    --tile-active: #38bdf8;
    --tile-wrong: #ef4444;
    --text: #f1f5f9;
    --text-muted: #94a3b8;
    --accent: #3b82f6;
    --speed-on: #f59e0b;
}

/* Thème Cyberpunk */
body.theme-cyber {
    --bg: #0a0a12;
    --surface: #1a0a2e;
    --tile: #2d1b4e;
    --tile-active: #ff00ff;
    --tile-wrong: #ff2222;
    --text: #e0e0ff;
    --text-muted: #a0a0cc;
    --accent: #00ffff;
    --speed-on: #ffff00;
}

/* Thème Forêt */
body.theme-forest {
    --bg: #0f1a0f;
    --surface: #1a2e1a;
    --tile: #2b4a2b;
    --tile-active: #a3e635;
    --tile-wrong: #ef4444;
    --text: #e8f5e8;
    --text-muted: #7aa07a;
    --accent: #22c55e;
    --speed-on: #f59e0b;
}

/* Style du sélecteur de thèmes */
.theme-selector {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 4px;
}

.theme-dot {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
}

.theme-dot:hover {
    transform: scale(1.2);
}

.theme-dot.active {
    border-color: var(--text);
    transform: scale(1.1);
    box-shadow: 0 0 8px rgba(255,255,255,0.2);
}

.theme-dot[data-theme=""] { background: #333; }
.theme-dot[data-theme="theme-blue"] { background: #334155; }
.theme-dot[data-theme="theme-cyber"] { background: #2d1b4e; }
.theme-dot[data-theme="theme-forest"] { background: #2b4a2b; }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
            user-select: none;
            overflow: hidden;
            position: relative;
        }

        /* Subtil fond animé */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background:
                radial-gradient(circle at 30% 35%, rgba(92,184,92,0.025) 0%, transparent 50%),
                radial-gradient(circle at 70% 65%, rgba(240,173,78,0.015) 0%, transparent 50%);
            animation: bgFloat 25s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes bgFloat {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(2%, 1%); }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
        }

        /* En-tête */
        .header {
            text-align: center;
        }

        .header h1 {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }

        .header p {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 300;
        }

        /* Scores */
        .scores {
            display: flex;
            gap: 40px;
            align-items: center;
        }

        .score-box {
            text-align: center;
        }

        .score-box .label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 2px;
        }

        .score-box .value {
            font-size: 2rem;
            font-weight: 700;
            transition: transform 0.2s ease;
        }

        .score-box .value.accent {
            color: var(--accent);
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .value.pulse {
            animation: pulse 0.3s ease;
        }

        /* Grille */
        .grid-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            max-width: 340px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 10px;
            width: 100%;
            height: 100%;
        }

        .tile {
            background: var(--tile);
            border-radius: 12px;
            cursor: pointer;
            transition: background-color 0.12s ease, transform 0.1s ease, box-shadow 0.12s ease;
            position: relative;
            overflow: hidden;
        }

        .tile::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 12px;
            opacity: 0;
            background: radial-gradient(circle at center, rgba(255,255,255,0.15), transparent 70%);
            transition: opacity 0.12s ease;
        }

        .tile:hover:not(.active):not(.locked) {
            background: #3d3d3d;
        }

        .tile:active:not(.locked) {
            transform: scale(0.95);
        }

        .tile.active {
    background: var(--tile-active);
    box-shadow: 0 0 20px color-mix(in srgb, var(--tile-active) 40%, transparent);
}

        .tile.active::after {
            opacity: 1;
        }

        .tile.wrong {
            background: var(--tile-wrong);
            box-shadow: 0 0 24px rgba(217,83,79,0.35);
        }

        .tile.locked {
            cursor: default;
        }

        /* Animation shake */
        .grid.shake {
            animation: shake 0.45s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 50%, 90% { transform: translateX(-5px); }
            30%, 70% { transform: translateX(5px); }
        }

        /* Apparition des tuiles */
        @keyframes tileIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        .tile.entering {
            animation: tileIn 0.35s ease backwards;
        }

        /* Contrôles */
        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            width: 100%;
        }

        .speed-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 8px 18px;
            border-radius: 30px;
            background: var(--surface);
            border: 1px solid #3a3a3a;
            transition: all 0.25s ease;
        }

        .speed-toggle:hover {
            border-color: #555;
        }

        .speed-toggle.active {
            border-color: var(--speed-on);
            background: rgba(240,173,78,0.08);
        }

        .speed-toggle .icon {
            font-size: 0.85rem;
            color: var(--text-muted);
            transition: color 0.25s ease;
        }

        .speed-toggle.active .icon {
            color: var(--speed-on);
        }

        .speed-toggle .text {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-muted);
            transition: color 0.25s ease;
        }

        .speed-toggle.active .text {
            color: var(--speed-on);
        }

        .speed-toggle .indicator {
            width: 34px;
            height: 18px;
            border-radius: 9px;
            background: #444;
            position: relative;
            transition: background 0.25s ease;
        }

        .speed-toggle.active .indicator {
            background: var(--speed-on);
        }

        .speed-toggle .indicator::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #fff;
            transition: transform 0.25s ease;
        }

        .speed-toggle.active .indicator::after {
            transform: translateX(16px);
        }

        .speed-hint {
            font-size: 0.65rem;
            color: var(--speed-on);
            opacity: 0;
            transition: opacity 0.3s ease;
            height: 0.9em;
            overflow: hidden;
        }

        .speed-hint.visible {
            opacity: 0.8;
        }

        .btn-start {
            padding: 14px 48px;
            border: none;
            border-radius: 10px;
            background: var(--accent);
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0.3px;
        }

        .btn-start:hover {
            background: #4ca64c;
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(92,184,92,0.25);
        }

        .btn-start:active {
            transform: translateY(0);
            box-shadow: none;
        }

        .btn-start:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 3px;
        }

        .btn-start.hidden {
            display: none;
        }

        /* Statut */
        .status {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 400;
            min-height: 1.3em;
            text-align: center;
            transition: color 0.2s ease;
        }

        .status.gameover {
            color: var(--tile-wrong);
            font-weight: 600;
            font-size: 0.95rem;
        }

        .status.success {
            color: var(--accent);
        }

        /* Nouveau record */
        .new-best {
            font-size: 0.75rem;
            color: var(--speed-on);
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.3s ease;
            height: 1em;
        }

        .new-best.visible {
            opacity: 1;
            animation: pulse 0.6s ease;
        }

        /* ===== Responsive Desktop ===== */
        @media (min-width: 768px) {
            .container {
                gap: 24px;
                max-width: 460px;
            }

            .header h1 {
                font-size: 1.8rem;
            }

            .header p {
                font-size: 0.9rem;
            }

            .score-box .value {
                font-size: 2.5rem;
            }

            .grid-wrapper {
                max-width: 380px;
            }

            .grid {
                gap: 14px;
            }

            .tile {
                border-radius: 14px;
            }

            .btn-start {
                padding: 16px 60px;
                font-size: 1.05rem;
            }
        }

        /* Petits écrans (hauteur réduite) */
        @media (max-height: 620px) {
            .container {
                gap: 10px;
            }

            .header h1 {
                font-size: 1.1rem;
            }

            .header p {
                display: none;
            }

            .score-box .value {
                font-size: 1.5rem;
            }

            .grid-wrapper {
                max-width: 260px;
            }

            .grid {
                gap: 8px;
            }
        }

        /* Très petits téléphones */
        @media (max-width: 340px) {
            .grid-wrapper {
                max-width: 280px;
            }

            .grid {
                gap: 8px;
            }

            .tile {
                border-radius: 10px;
            }

            .scores {
                gap: 28px;
            }

            .btn-start {
                padding: 12px 36px;
                font-size: 0.9rem;
            }
        }

        /* Mouvement réduit */
        @media (prefers-reduced-motion: reduce) {
            .tile,
            .speed-toggle,
            .speed-toggle .indicator,
            .speed-toggle .indicator::after,
            .speed-toggle .icon,
            .speed-toggle .text,
            .btn-start,
            .status,
            .speed-hint,
            .new-best {
                transition: none;
            }

            .grid.shake {
                animation: none;
            }

            .tile.entering {
                animation: none;
            }

            body::before {
                animation: none;
            }

            .value.pulse {
                animation: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Sequence Memory Test</h1>
            <p>Memorise la séquence des cases qui s'allument</p>
        </header>

                <div class="theme-selector" id="themeSelector">
            <div class="theme-dot active" data-theme="" title="Dark"></div>
            <div class="theme-dot" data-theme="theme-blue" title="Bleu"></div>
            <div class="theme-dot" data-theme="theme-cyber" title="Cyberpunk"></div>
            <div class="theme-dot" data-theme="theme-forest" title="Forêt"></div>
        </div>

        <div class="scores">
            <div class="score-box">
                <div class="label">Score</div>
                <div class="value accent" id="scoreDisplay">0</div>
            </div>
            <div class="score-box">
                <div class="label">Best</div>
                <div class="value" id="bestDisplay">0</div>
            </div>
        </div>

        <div class="new-best" id="newBestLabel">Nouveau record !</div>

        <div class="grid-wrapper">
            <div class="grid" id="grid" role="grid" aria-label="Grille de jeu 3x3"></div>
        </div>

        <div class="controls">
            <div class="speed-toggle" id="speedToggle" role="button" tabindex="0" aria-label="Activer le mode Speed">
                <i class="fa-solid fa-bolt icon"></i>
                <span class="text">Speed</span>
                <div class="indicator"></div>
            </div>
            <div class="speed-hint" id="speedHint">Seul le nouveau carré est affiché</div>
            <button class="btn-start" id="startBtn">Commencer</button>
        </div>

        <div class="status" id="status">Appuie sur Commencer pour jouer</div>
    </div>

    <script>
        /* ============================================
           Sequence Memory Test — Logique de jeu
           ============================================ */

        // --- État ---
        let sequence = [];
        let userStep = 0;
        let gameState = 'IDLE'; // IDLE | PLAYBACK | USER_INPUT | GAME_OVER
        let score = 0;
        let bestScore = parseInt(localStorage.getItem('sequenceBest')) || 0;
        let speedMode = false;
        let gameId = 0; // Pour annuler les séquences en cours

        // --- DOM ---
        const grid = document.getElementById('grid');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const bestDisplay = document.getElementById('bestDisplay');
        const statusEl = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');
        const speedToggle = document.getElementById('speedToggle');
        const speedHint = document.getElementById('speedHint');
        const newBestLabel = document.getElementById('newBestLabel');

        // --- Initialisation grille ---
        function initGrid() {
            grid.innerHTML = '';
            for (let i = 0; i < 9; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile entering';
                tile.dataset.id = i;
                tile.setAttribute('role', 'gridcell');
                tile.setAttribute('aria-label', `Case ${i + 1}`);
                tile.style.animationDelay = `${i * 0.04}s`;
                tile.addEventListener('click', () => handleTileClick(i));
                grid.appendChild(tile);
            }
            // Retirer la classe d'entrée après l'animation
            setTimeout(() => {
                grid.querySelectorAll('.tile').forEach(t => t.classList.remove('entering'));
            }, 600);
        }

        // --- Affichage ---
        function updateScore() {
            scoreDisplay.textContent = score;
            bestDisplay.textContent = bestScore;
        }

        function pulseElement(el) {
            el.classList.remove('pulse');
            void el.offsetWidth; // Force le reflow pour relancer l'animation
            el.classList.add('pulse');
        }

        function updateStatus(text, type = '') {
            statusEl.textContent = text;
            statusEl.className = 'status' + (type ? ' ' + type : '');
        }

        function getTile(id) {
            return grid.querySelector(`[data-id="${id}"]`);
        }

        // --- Utilitaires de timing ---
        function delay(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function highlightTile(id, duration) {
            return new Promise(resolve => {
                const tile = getTile(id);
                tile.classList.add('active');
                setTimeout(() => {
                    tile.classList.remove('active');
                    resolve();
                }, duration);
            });
        }

        // --- Timing progressif ---
        function getDuration() {
            // Diminue de 15ms par élément, minimum 200ms
            return Math.max(200, 600 - (sequence.length * 15));
        }

        function getGap() {
            // Diminue de 10ms par élément, minimum 120ms
            return Math.max(120, 400 - (sequence.length * 10));
        }

        // --- Génération ---
        function nextStep() {
            const tile = Math.floor(Math.random() * 9);
            sequence.push(tile);
        }

        // --- Lecture de la séquence ---
        async function playSequence(currentGameId) {
            gameState = 'PLAYBACK';
            updateStatus('Regarde bien...');

            // Verrouiller les tuiles pendant l'affichage
            grid.querySelectorAll('.tile').forEach(t => t.classList.add('locked'));

            await delay(350);

            // En mode Speed, on ne montre que le dernier carré ajouté
            const items = speedMode ? [sequence[sequence.length - 1]] : sequence;

            for (let i = 0; i < items.length; i++) {
                // Vérifier que la partie n'a pas été relancée
                if (gameId !== currentGameId) return;

                await highlightTile(items[i], getDuration());

                if (gameId !== currentGameId) return;

                // Pas de délai après le dernier élément
                if (i < items.length - 1) {
                    await delay(getGap());
                }
            }

            if (gameId !== currentGameId) return;

            // Déverrouiller les tuiles
            grid.querySelectorAll('.tile').forEach(t => t.classList.remove('locked'));

            gameState = 'USER_INPUT';
            userStep = 0;
            updateStatus('À toi !');
        }

        // --- Clic sur une tuile ---
        function handleTileClick(id) {
            if (gameState !== 'USER_INPUT') return;

            if (id === sequence[userStep]) {
                // Bonne réponse — flash blanc rapide
                const tile = getTile(id);
                tile.classList.add('active');
                setTimeout(() => tile.classList.remove('active'), 150);

                userStep++;

                if (userStep === sequence.length) {
                    // Manche réussie
                    score++;
                    updateScore();
                    pulseElement(scoreDisplay);

                    gameState = 'PLAYBACK'; // Verrouiller temporairement
                    updateStatus('Bien joué !', 'success');

                    setTimeout(() => startRound(), 700);
                }
            } else {
                // Mauvaise réponse
                gameOver(id);
            }
        }

        // --- Game Over ---
        function gameOver(wrongId) {
            gameState = 'GAME_OVER';

            // Flash rouge sur la mauvaise tuile
            const tile = getTile(wrongId);
            tile.classList.add('wrong');
            setTimeout(() => tile.classList.remove('wrong'), 600);

            // Secouer la grille
            grid.classList.add('shake');
            setTimeout(() => grid.classList.remove('shake'), 500);

            // Vérifier le meilleur score
            let isNewBest = false;
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('sequenceBest', bestScore);
                isNewBest = true;
            }

            updateScore();

            if (isNewBest) {
                pulseElement(bestDisplay);
                newBestLabel.classList.add('visible');
            }

            updateStatus(`Game Over ! Niveau atteint : ${score}`, 'gameover');

            startBtn.textContent = 'Recommencer';
            startBtn.classList.remove('hidden');
        }

        // --- Nouvelle manche ---
        function startRound() {
            nextStep();
            const currentGameId = gameId;
            playSequence(currentGameId);
        }

        // --- Démarrer le jeu ---
        function startGame() {
            gameId++; // Invalide toute séquence en cours
            sequence = [];
            score = 0;
            userStep = 0;

            newBestLabel.classList.remove('visible');
            updateScore();
            updateStatus('');
            startBtn.classList.add('hidden');

            startRound();
        }

        // --- Toggle Speed ---
        function toggleSpeed() {
            if (gameState === 'PLAYBACK') return; // Pas de changement pendant l'affichage
            speedMode = !speedMode;
            speedToggle.classList.toggle('active', speedMode);
            speedHint.classList.toggle('visible', speedMode);
        }

        speedToggle.addEventListener('click', toggleSpeed);
        speedToggle.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                toggleSpeed();
            }
        });

        // --- Bouton Start ---
        startBtn.addEventListener('click', startGame);

        // --- Initialisation ---
                // --- Thèmes ---
        const themeSelector = document.getElementById('themeSelector');
        const themeDots = document.querySelectorAll('.theme-dot');

        function applyTheme(themeName) {
            // Retire toutes les classes de thème du body
            document.body.className = '';
            if (themeName) {
                document.body.classList.add(themeName);
            }
            // Met à jour le point actif
            themeDots.forEach(dot => {
                dot.classList.toggle('active', dot.dataset.theme === themeName);
            });
            // Sauvegarde le choix
            localStorage.setItem('sequenceTheme', themeName);
        }

        themeDots.forEach(dot => {
            dot.addEventListener('click', () => {
                applyTheme(dot.dataset.theme);
            });
        });

        // Charge le thème sauvegardé au lancement
        const savedTheme = localStorage.getItem('sequenceTheme') || '';
        applyTheme(savedTheme);

        // --- Initialisation ---
        initGrid();
        updateScore();
    </script>
</body>
</html>
