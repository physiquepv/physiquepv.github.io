<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Human Benchmark</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #1a1a1a;
            --surface: #222222;
            --tile: #333333;
            --tile-active: #ffffff;
            --tile-wrong: #d9534f;
            --text: #e8e8e8;
            --text-muted: #777777;
            --accent: #5cb85c;
            --speed-on: #f0ad4e;
            --chimp-tile: #444444;
            --chimp-hidden: #888888;
        }

        body.theme-blue {
            --bg: #0f172a;
            --surface: #1e293b;
            --tile: #334155;
            --tile-active: #38bdf8;
            --tile-wrong: #ef4444;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --speed-on: #f59e0b;
            --chimp-tile: #3b4963;
            --chimp-hidden: #7da3c7;
        }

        body.theme-cyber {
            --bg: #0a0a12;
            --surface: #1a0a2e;
            --tile: #2d1b4e;
            --tile-active: #ff00ff;
            --tile-wrong: #ff2222;
            --text: #e0e0ff;
            --text-muted: #a0a0cc;
            --accent: #00ffff;
            --speed-on: #ffff00;
            --chimp-tile: #3d1b6e;
            --chimp-hidden: #a0a0cc;
        }

        body.theme-forest {
            --bg: #0f1a0f;
            --surface: #1a2e1a;
            --tile: #2b4a2b;
            --tile-active: #a3e635;
            --tile-wrong: #ef4444;
            --text: #e8f5e8;
            --text-muted: #7aa07a;
            --accent: #22c55e;
            --speed-on: #f59e0b;
            --chimp-tile: #3b6b3b;
            --chimp-hidden: #7aa07a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px;
            user-select: none;
            overflow-x: hidden;
        }

        .app {
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Onglets */
        .tabs {
            display: flex;
            width: 100%;
            margin-bottom: 16px;
            background: var(--surface);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--tile);
        }

        .tab-btn {
            flex: 1;
            padding: 12px 6px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.25s, color 0.25s;
        }

        .tab-btn.active {
            background: var(--tile);
            color: var(--text);
        }

        .tab-btn:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: -2px;
        }

        /* Thèmes */
        .themes {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        .th-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.2s, border-color 0.2s;
        }

        .th-dot:hover { transform: scale(1.2); }
        .th-dot.on { border-color: var(--text); transform: scale(1.1); }
        .th-dot[data-t=""] { background: #333; }
        .th-dot[data-t="theme-blue"] { background: #334155; }
        .th-dot[data-t="theme-cyber"] { background: #2d1b4e; }
        .th-dot[data-t="theme-forest"] { background: #2b4a2b; }

        /* Sections */
        .section {
            width: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }

        .section.on {
            display: flex;
        }

        /* Header */
        .hdr { text-align: center; }
        .hdr h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.3px; }
        .hdr p { font-size: 0.72rem; color: var(--text-muted); margin-top: 3px; font-weight: 300; }

        /* Stats */
        .stats {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .st { text-align: center; }
        .st .lb { font-size: 0.58rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); margin-bottom: 1px; }
        .st .vl { font-size: 1.7rem; font-weight: 700; color: var(--accent); }
        .st .vl.sc { color: var(--text); }

        .lives {
            display: flex;
            gap: 5px;
            font-size: 1.1rem;
            color: var(--tile-wrong);
        }

        .lives i {
            transition: opacity 0.3s, transform 0.3s;
        }

        .lives i.off {
            opacity: 0.15;
            transform: scale(0.7);
        }

        /* Grille Sequence */
        .grid-wrap {
            width: 100%;
            max-width: 320px;
            aspect-ratio: 1 / 1;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 10px;
            width: 100%;
            height: 100%;
        }

        .tile {
            background: var(--tile);
            border-radius: 12px;
            cursor: pointer;
            transition: background-color 0.12s, transform 0.1s, box-shadow 0.15s;
        }

        .tile:hover:not(.lit):not(.lk) {
            background: #3d3d3d;
        }

        .tile:active:not(.lk) {
            transform: scale(0.94);
        }

        .tile.lit {
            background: var(--tile-active);
            box-shadow: 0 0 22px rgba(255,255,255,0.12);
        }

        .tile.err {
            background: var(--tile-wrong);
            box-shadow: 0 0 20px rgba(217,83,79,0.35);
        }

        .tile.lk {
            cursor: default;
        }

        .grid.shk {
            animation: shk 0.4s ease;
        }

        @keyframes shk {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }

        /* Chimp area */
        .chimp-zone {
            width: 100%;
            max-width: 320px;
            aspect-ratio: 1 / 1;
            background: var(--surface);
            border-radius: 14px;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--tile);
        }

        .chimp-cell {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--chimp-tile);
            border-radius: 8px;
            font-weight: 700;
            color: var(--text);
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }

        .chimp-cell:active {
            transform: scale(0.9);
        }

        .chimp-cell.hid {
            background: var(--chimp-hidden);
            color: transparent;
        }

        .chimp-cell.ok {
            background: var(--accent);
            color: #fff;
            transform: scale(0.93);
        }

        .chimp-cell.bad {
            background: var(--tile-wrong);
            color: #fff;
        }

        /* Contrôles */
        .ctrls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .spd {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 7px 14px;
            border-radius: 28px;
            background: var(--surface);
            border: 1px solid var(--tile);
            transition: border-color 0.25s, background 0.25s;
        }

        .spd.on {
            border-color: var(--speed-on);
            background: rgba(240,173,78,0.07);
        }

        .spd .ic {
            font-size: 0.78rem;
            color: var(--text-muted);
            transition: color 0.25s;
        }

        .spd.on .ic { color: var(--speed-on); }

        .spd .tx {
            font-size: 0.72rem;
            font-weight: 500;
            color: var(--text-muted);
            transition: color 0.25s;
        }

        .spd.on .tx { color: var(--speed-on); }

        .sw {
            width: 30px;
            height: 15px;
            border-radius: 8px;
            background: #444;
            position: relative;
            transition: background 0.25s;
        }

        .spd.on .sw { background: var(--speed-on); }

        .sw::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 11px;
            height: 11px;
            border-radius: 50%;
            background: #fff;
            transition: transform 0.25s;
        }

        .spd.on .sw::after {
            transform: translateX(15px);
        }

        .btn {
            padding: 13px 38px;
            border: none;
            border-radius: 10px;
            background: var(--accent);
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.92rem;
            font-weight: 600;
            cursor: pointer;
            transition: filter 0.2s, transform 0.15s;
        }

        .btn:hover {
            filter: brightness(1.12);
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn.hide {
            display: none;
        }

        .sts {
            font-size: 0.82rem;
            color: var(--text-muted);
            min-height: 1.2em;
            text-align: center;
        }

        .sts.err { color: var(--tile-wrong); font-weight: 600; }
        .sts.win { color: var(--accent); font-weight: 500; }

        /* Desktop */
        @media (min-width: 768px) {
            .app { max-width: 480px; }
            .hdr h1 { font-size: 1.55rem; }
            .hdr p { font-size: 0.82rem; }
            .grid-wrap, .chimp-zone { max-width: 370px; }
            .grid { gap: 14px; }
            .tile { border-radius: 14px; }
            .st .vl { font-size: 2.1rem; }
        }

        /* Petit écran hauteur */
        @media (max-height: 660px) {
            .section { gap: 8px; }
            .hdr h1 { font-size: 1.05rem; }
            .hdr p { display: none; }
            .grid-wrap, .chimp-zone { max-width: 250px; }
            .st .vl { font-size: 1.4rem; }
            .tabs { margin-bottom: 10px; }
            .themes { margin-bottom: 8px; }
        }

        @media (max-width: 350px) {
            .grid-wrap, .chimp-zone { max-width: 270px; }
            .grid { gap: 8px; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>

<div class="app">
    <!-- Onglets -->
    <nav class="tabs" role="tablist">
        <button class="tab-btn active" data-go="sec-seq" role="tab" aria-selected="true">Sequence Memory</button>
        <button class="tab-btn" data-go="sec-chimp" role="tab" aria-selected="false">Chimp Test</button>
    </nav>

    <!-- Thèmes -->
    <div class="themes">
        <div class="th-dot on" data-t="" title="Dark"></div>
        <div class="th-dot" data-t="theme-blue" title="Bleu"></div>
        <div class="th-dot" data-t="theme-cyber" title="Cyberpunk"></div>
        <div class="th-dot" data-t="theme-forest" title="Forêt"></div>
    </div>

    <!-- ======== SEQUENCE MEMORY ======== -->
    <section id="sec-seq" class="section on">
        <div class="hdr">
            <h1>Sequence Memory</h1>
            <p>Memorise l'ordre des cases qui s'allument</p>
        </div>

        <div class="stats">
            <div class="st">
                <div class="lb">Niveau</div>
                <div class="vl" id="sq-s">0</div>
            </div>
            <div class="st">
                <div class="lb">Best</div>
                <div class="vl sc" id="sq-b">0</div>
            </div>
            <div class="st">
                <div class="lb">Vies</div>
                <div class="lives" id="sq-l">
                    <i class="fa-solid fa-heart"></i>
                    <i class="fa-solid fa-heart"></i>
                    <i class="fa-solid fa-heart"></i>
                </div>
            </div>
        </div>

        <div class="grid-wrap">
            <div class="grid" id="sq-g"></div>
        </div>

        <div class="ctrls">
            <div class="spd" id="spd-btn" role="button" tabindex="0" aria-label="Mode Speed">
                <i class="fa-solid fa-bolt ic"></i>
                <span class="tx">Speed</span>
                <div class="sw"></div>
            </div>
            <button class="btn" id="sq-go">Commencer</button>
        </div>

        <div class="sts" id="sq-st">Appuie sur Commencer</div>
    </section>

    <!-- ======== CHIMP TEST ======== -->
    <section id="sec-chimp" class="section">
        <div class="hdr">
            <h1>Chimp Test</h1>
            <p>Clique les nombres dans l'ordre croissant</p>
        </div>

        <div class="stats">
            <div class="st">
                <div class="lb">Niveau</div>
                <div class="vl" id="ch-s">4</div>
            </div>
            <div class="st">
                <div class="lb">Best</div>
                <div class="vl sc" id="ch-b">0</div>
            </div>
            <div class="st">
                <div class="lb">Strikes</div>
                <div class="lives" id="ch-k">
                    <i class="fa-solid fa-xmark"></i>
                    <i class="fa-solid fa-xmark"></i>
                    <i class="fa-solid fa-xmark"></i>
                </div>
            </div>
        </div>

        <div class="chimp-zone" id="ch-z"></div>

        <div class="ctrls">
            <button class="btn" id="ch-go">Commencer</button>
        </div>

        <div class="sts" id="ch-st">Appuie sur Commencer</div>
    </section>
</div>

<script>
/* ========================================
   Commun : onglets & thèmes
   ======================================== */

// Onglets
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => {
            b.classList.remove('active');
            b.setAttribute('aria-selected', 'false');
        });
        btn.classList.add('active');
        btn.setAttribute('aria-selected', 'true');
        document.querySelectorAll('.section').forEach(s => s.classList.remove('on'));
        document.getElementById(btn.dataset.go).classList.add('on');
    });
});

// Thèmes
document.querySelectorAll('.th-dot').forEach(dot => {
    dot.addEventListener('click', () => {
        document.body.className = dot.dataset.t;
        document.querySelectorAll('.th-dot').forEach(d => d.classList.remove('on'));
        dot.classList.add('on');
        try { localStorage.setItem('hb_th', dot.dataset.t); } catch(e) {}
    });
});

// Charger thème sauvegardé
(function loadTheme() {
    try {
        var t = localStorage.getItem('hb_th') || '';
        document.body.className = t;
        document.querySelectorAll('.th-dot').forEach(d => {
            d.classList.toggle('on', d.dataset.t === t);
        });
    } catch(e) {}
})();

/* ========================================
   SEQUENCE MEMORY
   ======================================== */
(function() {
    var grid = document.getElementById('sq-g');
    var scoreEl = document.getElementById('sq-s');
    var bestEl = document.getElementById('sq-b');
    var livesEl = document.getElementById('sq-l');
    var statusEl = document.getElementById('sq-st');
    var startBtn = document.getElementById('sq-go');
    var spdBtn = document.getElementById('spd-btn');

    var sequence = [];
    var userStep = 0;
    var state = 'IDLE';
    var score = 0;
    var best = 0;
    var lives = 3;
    var gid = 0;
    var speedMode = false;
    var running = false;

    try { best = parseInt(localStorage.getItem('sq_best')) || 0; } catch(e) {}

    // Créer la grille
    function buildGrid() {
        grid.innerHTML = '';
        for (var i = 0; i < 9; i++) {
            var d = document.createElement('div');
            d.className = 'tile';
            d.setAttribute('data-i', i);
            (function(idx) {
                d.addEventListener('click', function() { onClick(idx); });
            })(i);
            grid.appendChild(d);
        }
    }

    function refresh() {
        scoreEl.textContent = score;
        bestEl.textContent = best;
        var hearts = livesEl.querySelectorAll('i');
        for (var i = 0; i < hearts.length; i++) {
            if (i < lives) {
                hearts[i].classList.remove('off');
            } else {
                hearts[i].classList.add('off');
            }
        }
    }

    function msg(t, c) {
        statusEl.textContent = t;
        statusEl.className = 'sts' + (c ? ' ' + c : '');
    }

    function tile(i) { return grid.querySelector('[data-i="' + i + '"]'); }

    function wait(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

    function light(i, ms) {
        return new Promise(function(r) {
            var t = tile(i);
            t.classList.add('lit');
            setTimeout(function() {
                t.classList.remove('lit');
                r();
            }, ms);
        });
    }

    function getDur() { return Math.max(200, 600 - sequence.length * 15); }
    function getGap() { return Math.max(120, 400 - sequence.length * 10); }

    async function playback(id) {
        state = 'PLAYBACK';
        running = true;
        msg('Regarde bien...');

        // Verrouiller
        var tiles = grid.querySelectorAll('.tile');
        for (var k = 0; k < tiles.length; k++) tiles[k].classList.add('lk');

        await wait(400);

        // En mode speed, seul le dernier
        var items = speedMode ? [sequence[sequence.length - 1]] : sequence;

        for (var j = 0; j < items.length; j++) {
            if (gid !== id) { running = false; return; }
            await light(items[j], getDur());
            if (gid !== id) { running = false; return; }
            if (j < items.length - 1) await wait(getGap());
        }

        if (gid !== id) { running = false; return; }

        // Déverrouiller
        for (var k = 0; k < tiles.length; k++) tiles[k].classList.remove('lk');

        state = 'INPUT';
        userStep = 0;
        running = false;
        msg('À toi !');
    }

    function onClick(i) {
        if (state !== 'INPUT') return;

        var t = tile(i);

        if (i === sequence[userStep]) {
            t.classList.add('lit');
            setTimeout(function() { t.classList.remove('lit'); }, 150);
            userStep++;

            if (userStep === sequence.length) {
                score++;
                if (score > best) {
                    best = score;
                    try { localStorage.setItem('sq_best', best); } catch(e) {}
                }
                refresh();
                state = 'PLAYBACK';
                msg('Bien joué !', 'win');
                setTimeout(function() { nextRound(); }, 700);
            }
        } else {
            t.classList.add('err');
            setTimeout(function() { t.classList.remove('err'); }, 600);
            grid.classList.add('shk');
            setTimeout(function() { grid.classList.remove('shk'); }, 400);

            lives--;
            refresh();

            if (lives <= 0) {
                gameOver();
            } else {
                msg('Faux ! ' + lives + ' vie' + (lives > 1 ? 's' : '') + ' restante' + (lives > 1 ? 's' : ''), 'err');
                state = 'PLAYBACK';
                setTimeout(function() { playback(gid); }, 1200);
            }
        }
    }

    function nextRound() {
        var n = Math.floor(Math.random() * 9);
        sequence.push(n);
        playback(gid);
    }

    function gameOver() {
        state = 'OVER';
        msg('Game Over ! Niveau : ' + score, 'err');
        startBtn.textContent = 'Recommencer';
        startBtn.classList.remove('hide');
    }

    function start() {
        gid++;
        sequence = [];
        score = 0;
        lives = 3;
        userStep = 0;
        refresh();
        msg('');
        startBtn.classList.add('hide');
        nextRound();
    }

    startBtn.addEventListener('click', start);

    spdBtn.addEventListener('click', function() {
        if (state === 'PLAYBACK' && running) return;
        speedMode = !speedMode;
        spdBtn.classList.toggle('on', speedMode);
    });

    buildGrid();
    refresh();
})();

/* ========================================
   CHIMP TEST
   ======================================== */
(function() {
    var zone = document.getElementById('ch-z');
    var scoreEl = document.getElementById('ch-s');
    var bestEl = document.getElementById('ch-b');
    var strikesEl = document.getElementById('ch-k');
    var statusEl = document.getElementById('ch-st');
    var startBtn = document.getElementById('ch-go');

    var level = 4;
    var best = 0;
    var strikes = 0;
    var state = 'IDLE';
    var expected = 1;
    var cells = [];

    try { best = parseInt(localStorage.getItem('ch_best')) || 0; } catch(e) {}

    function refresh() {
        scoreEl.textContent = level;
        bestEl.textContent = best;
        var marks = strikesEl.querySelectorAll('i');
        // Les premiers = strikes utilisés (rouges), les autres = off (grisés)
        for (var i = 0; i < marks.length; i++) {
            if (i < strikes) {
                marks[i].classList.remove('off');
            } else {
                marks[i].classList.add('off');
            }
        }
    }

    function msg(t, c) {
        statusEl.textContent = t;
        statusEl.className = 'sts' + (c ? ' ' + c : '');
    }

    function getTileSize(n) {
        if (n <= 7) return 16;
        if (n <= 12) return 13;
        if (n <= 20) return 10;
        return 8;
    }

    function generate(n) {
        var sz = getTileSize(n);
        var pad = 3;
        var maxP = 100 - sz - pad;
        var gap = sz + 2;
        var positions = [];

        for (var i = 0; i < n; i++) {
            var ok = false;
            var tries = 0;
            while (!ok && tries < 500) {
                var x = pad + Math.random() * (maxP - pad);
                var y = pad + Math.random() * (maxP - pad);
                var clash = false;
                for (var j = 0; j < positions.length; j++) {
                    if (Math.abs(positions[j].x - x) < gap && Math.abs(positions[j].y - y) < gap) {
                        clash = true;
                        break;
                    }
                }
                if (!clash) {
                    positions.push({ x: x, y: y });
                    ok = true;
                }
                tries++;
            }
            if (!ok) {
                positions.push({
                    x: pad + Math.random() * maxP,
                    y: pad + Math.random() * maxP
                });
            }
        }
        return { pos: positions, sz: sz };
    }

    function render(showAll) {
        zone.innerHTML = '';
        var sz = cells[0] ? cells[0].sz : 16;

        for (var i = 0; i < cells.length; i++) {
            var c = cells[i];
            var d = document.createElement('div');
            d.className = 'chimp-cell';
            d.style.width = sz + '%';
            d.style.height = sz + '%';
            d.style.left = c.x + '%';
            d.style.top = c.y + '%';
            d.style.fontSize = (sz > 12 ? '1.2rem' : sz > 9 ? '1rem' : '0.8rem');
            d.textContent = c.num;
            d.setAttribute('data-n', c.num);

            if (!showAll && c.num !== 1) {
                d.classList.add('hid');
            }

            (function(num, el) {
                d.addEventListener('click', function() { handleClick(num, el); });
            })(c.num, d);

            zone.appendChild(d);
        }
    }

    function handleClick(num, el) {
        // Premier clic sur 1 → cacher le reste
        if (state === 'SHOW' && num === 1) {
            state = 'PLAY';
            expected = 2;
            el.classList.add('ok');
            var all = zone.querySelectorAll('.chimp-cell');
            for (var i = 0; i < all.length; i++) {
                if (all[i] !== el) {
                    all[i].classList.add('hid');
                }
            }
            msg('Trouve les autres dans l\'ordre !');
            return;
        }

        if (state !== 'PLAY') return;

        if (num === expected) {
            el.classList.remove('hid');
            el.classList.add('ok');
            expected++;

            if (expected > level) {
                // Niveau réussi
                if (level > best) {
                    best = level;
                    try { localStorage.setItem('ch_best', best); } catch(e) {}
                }

                if (level >= 41) {
                    best = 41;
                    try { localStorage.setItem('ch_best', 41); } catch(e) {}
                    refresh();
                    msg('Parfait ! Score max (41) !', 'win');
                    state = 'OVER';
                    startBtn.textContent = 'Recommencer';
                    startBtn.classList.remove('hide');
                    return;
                }

                refresh();
                msg('Bien joué !', 'win');
                state = 'WAIT';
                setTimeout(function() {
                    level++;
                    refresh();
                    newRound();
                }, 1000);
            }
        } else {
            // Mauvais
            el.classList.remove('hid');
            el.classList.add('bad');
            strikes++;
            refresh();

            if (strikes >= 3) {
                chimpOver();
            } else {
                msg('Faux ! Strike ' + strikes + '/3', 'err');
                state = 'WAIT';
                setTimeout(function() { newRound(); }, 1200);
            }
        }
    }

    function newRound() {
        expected = 1;
        var result = generate(level);
        cells = [];
        for (var i = 0; i < result.pos.length; i++) {
            cells.push({
                num: i + 1,
                x: result.pos[i].x,
                y: result.pos[i].y,
                sz: result.sz
            });
        }
        state = 'SHOW';
        msg('Memorise les positions...');
        render(true);
    }

    function chimpOver() {
        state = 'OVER';
        // Révéler tout
        var all = zone.querySelectorAll('.chimp-cell');
        for (var i = 0; i < all.length; i++) {
            all[i].classList.remove('hid');
        }
        msg('Game Over ! Niveau atteint : ' + level, 'err');
        startBtn.textContent = 'Recommencer';
        startBtn.classList.remove('hide');
    }

    function startGame() {
        level = 4;
        strikes = 0;
        refresh();
        startBtn.classList.add('hide');
        newRound();
    }

    startBtn.addEventListener('click', startGame);

    refresh();
})();
</script>
</body>
</html>
